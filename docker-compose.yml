services:
  mongodb:
    image: mongo:6
    container_name: skyoffice-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: skyoffice
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ${SERVER_IMAGE:-skyoffice-server:local}
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skyoffice-server
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: ${PORT:-2567}
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://mongodb:27017/skyoffice}
    ports:
      - '${BACKEND_HTTP_PORT:-127.0.0.1:2567}:2567'
    restart: unless-stopped

  frontend:
    image: ${CLIENT_IMAGE:-skyoffice-client:local}
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-}
    container_name: skyoffice-frontend
    depends_on:
      - server
    ports:
      - '${FRONTEND_HTTP_PORT:-127.0.0.1:8080}:80'
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: skyoffice-cloudflared
    profiles:
      - cloudflare
    depends_on:
      frontend:
        condition: service_started
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped

volumes:
  mongodb_data:
